services:
  db:
    image: postgres:16-alpine
    container_name: sellernerve-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellernerve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sellernerve}
      POSTGRES_DB: ${POSTGRES_DB:-sellernerve}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sellernerve} -d ${POSTGRES_DB:-sellernerve}"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - sellernerve_pgdata:/var/lib/postgresql/data

volumes:
  sellernerve_pgdata: {}
